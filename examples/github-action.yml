# Preflight Scout Action 0.1.0, pinned to its reviewed release commit.
name: Preflight Scout
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write
  deployments: read

jobs:
  preflight_scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: fenutech/preflight-scout@635367af48d1c75b95a08b3e97001258729c0d46 # v0.1.0
        with:
          github-token: ${{ github.token }}
          mode: analyze-and-run
          mission-limit: "1"
          fail-on: needs_attention
        env:
          PREFLIGHT_SCOUT_LLM_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PREFLIGHT_SCOUT_APP_URL: ${{ vars.PREFLIGHT_SCOUT_APP_URL }}
