name: Publish npm packages

on:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-publication
  cancel-in-progress: false

permissions: {}

jobs:
  validate:
    name: Validate immutable npm candidate
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      actions: read
      checks: read
      contents: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      artifact-name: ${{ steps.candidate.outputs.artifact_name }}
      checksums-sha256: ${{ steps.candidate.outputs.checksums_sha256 }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          package-manager-cache: false

      - name: Resolve and validate the protected release tag
        id: release
        env:
          EXPECTED_REPOSITORY: fenutech/preflight-scout
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          set -euo pipefail
          [[ "$REPOSITORY" == "$EXPECTED_REPOSITORY" ]]
          [[ "$REPOSITORY_PRIVATE" == "false" ]]
          [[ "$GITHUB_REF_TYPE" == "tag" ]]
          [[ "$GITHUB_REF" == "refs/tags/${GITHUB_REF_NAME}" ]]
          [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          printf 'version=%s\n' "${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.ref }}

      - name: Verify the tag follows the stable channel and is contained in main
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$GITHUB_SHA" ]]
          [[ "$(git rev-list -n 1 "$GITHUB_REF")" == "$GITHUB_SHA" ]]
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/plugin-stable:refs/remotes/origin/plugin-stable
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
          git merge-base --is-ancestor refs/remotes/origin/plugin-stable "$GITHUB_SHA"

      - name: Verify live repository and protected npm environment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/verify-publication-gates.mjs --github-actions-token

      - name: Verify release ordering before any publication
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/test-release-order.mjs
          node scripts/verify-release-order.mjs --version "$VERSION" --commit "$GITHUB_SHA"

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "24.15.0"

      - run: pnpm install --frozen-lockfile
      - run: pnpm prepare:packages
      - run: pnpm check:package-assets
      - run: pnpm test:prepare-release
      - run: pnpm test:release-version
      - run: pnpm test:release-order
      - run: pnpm check:release-version -- "${{ steps.release.outputs.version }}"
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test:ci
      - run: pnpm playwright:install:ci
      - run: pnpm test:browser
      - run: pnpm audit --prod --audit-level high
      - run: pnpm check:repo
      - run: pnpm test:package-guard
      - run: pnpm test:source-cli-wrapper
      - run: pnpm test:external-tools
      - run: pnpm test:repo-boundary
      - run: pnpm test:publication
      - run: pnpm pack:check
      - run: pnpm test:npm-global-smoke
      - run: pnpm smoke:npm-global
        env:
          PREFLIGHT_SCOUT_NPM_SMOKE_INSTALL_BROWSER: "1"
      - run: pnpm smoke:install
        env:
          PREFLIGHT_SCOUT_SMOKE_INSTALL_BROWSER: "1"
      - run: pnpm test:skill
      - run: pnpm package:skill
      - name: Verify npm would accept all package publications
        run: pnpm -r --filter './packages/*' publish --access public --dry-run --no-git-checks

      - name: Build immutable publication artifact
        id: candidate
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/publication-artifact.mjs prepare \
            --source .preflight-scout/package-check \
            --output .preflight-scout/publication-candidate \
            --version "$VERSION" \
            --commit "$GITHUB_SHA"
          checksums_sha256="sha256:$(sha256sum .preflight-scout/publication-candidate/SHA256SUMS | cut -d ' ' -f 1)"
          artifact_name="preflight-scout-npm-${VERSION}-${GITHUB_SHA}"
          printf 'checksums_sha256=%s\n' "$checksums_sha256" >> "$GITHUB_OUTPUT"
          printf 'artifact_name=%s\n' "$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload exact publication candidate
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.candidate.outputs.artifact_name }}
          path: .preflight-scout/publication-candidate/
          include-hidden-files: false
          if-no-files-found: error
          compression-level: 0
          retention-days: 2

  publish:
    name: Publish verified npm tarballs
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm-production
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          package-manager-cache: false

      - name: Install the pinned OIDC-capable npm CLI without lifecycle scripts
        run: |
          npm install --global npm@11.18.0 --ignore-scripts --registry=https://registry.npmjs.org/
          [[ "$(npm --version)" == "11.18.0" ]]

      - name: Download only this run's validated candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.validate.outputs.artifact-name }}
          path: publication-candidate

      - name: Reverify artifact identity, checksums, version, and commit
        env:
          EXPECTED_CHECKSUMS_SHA256: ${{ needs.validate.outputs.checksums-sha256 }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          [[ "${{ needs.validate.outputs.artifact-digest }}" =~ ^[0-9a-f]{64}$ ]]
          actual="sha256:$(sha256sum publication-candidate/SHA256SUMS | cut -d ' ' -f 1)"
          [[ "$actual" == "$EXPECTED_CHECKSUMS_SHA256" ]]
          node publication-candidate/publication-artifact.mjs verify \
            --directory publication-candidate \
            --version "$VERSION" \
            --commit "$GITHUB_SHA"

      - name: Publish with package-specific npm trusted publishers
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          node publication-candidate/publication-artifact.mjs publish \
            --directory publication-candidate \
            --version "$VERSION" \
            --commit "$GITHUB_SHA" \
            --mode trusted-publishing

  verify-live-install:
    name: Verify live npm install (${{ matrix.os }})
    needs: [validate, publish]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          package-manager-cache: false

      - name: Wait for the exact public registry version and latest dist-tag
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          packages=(core agent-exec browser-runner mcp github-action cli)
          mismatched=()
          for _attempt in {1..60}; do
            mismatched=()
            for package in "${packages[@]}"; do
              exact="$(npm view "@preflight-scout/${package}@${VERSION}" version --registry=https://registry.npmjs.org/ 2>/dev/null || true)"
              latest="$(npm view "@preflight-scout/${package}" dist-tags.latest --registry=https://registry.npmjs.org/ 2>/dev/null || true)"
              if [[ "$exact" != "$VERSION" || "$latest" != "$VERSION" ]]; then
                mismatched+=("@preflight-scout/${package} exact=${exact:-missing} latest=${latest:-missing}")
              fi
            done
            if (( ${#mismatched[@]} == 0 )); then
              exit 0
            fi
            sleep 5
          done
          printf 'These packages did not expose the exact version and matching latest dist-tag: %s\n' "${mismatched[*]}" >&2
          exit 1

      - name: Install the exact public CLI with npm
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: npm install --global --prefix "$RUNNER_TEMP/preflight-scout-npm" "@preflight-scout/cli@${VERSION}" --registry=https://registry.npmjs.org/

      - name: Validate the installed command and browser on Linux
        if: runner.os == 'Linux'
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          command="$RUNNER_TEMP/preflight-scout-npm/bin/preflight-scout"
          [[ "$("$command" --version)" == "$VERSION" ]]
          "$command" install-browser

      - name: Validate the installed command and browser on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          $command = Join-Path $env:RUNNER_TEMP "preflight-scout-npm\preflight-scout.cmd"
          if ((& $command --version).Trim() -ne $env:VERSION) { throw "Unexpected Preflight Scout version" }
          & $command install-browser

  release:
    name: Create matching GitHub release
    needs: [validate, verify-live-install]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.ref }}

      - name: Create or verify the matching release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          title="Preflight Scout ${VERSION} — public alpha"
          [[ "$GITHUB_REPOSITORY" == "fenutech/preflight-scout" ]]
          [[ "$GITHUB_REF_TYPE" == "tag" ]]
          [[ "$GITHUB_REF" == "refs/tags/${tag}" ]]
          [[ "$GITHUB_REF_NAME" == "$tag" ]]
          [[ "$(git rev-parse HEAD)" == "$GITHUB_SHA" ]]
          [[ "$(git rev-list -n 1 "$tag")" == "$GITHUB_SHA" ]]

          if existing="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json tagName 2>&1)"; then
            :
          elif [[ "$existing" == "release not found" ]]; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --latest \
              --generate-notes \
              --verify-tag
          else
            printf 'Could not check existing release: %s\n' "$existing" >&2
            exit 1
          fi

          fields="$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" \
            --jq '[.tag_name, .name, (.draft | tostring), (.prerelease | tostring), (.immutable | tostring), .html_url] | @tsv')"
          IFS=$'\t' read -r actual_tag actual_name is_draft is_prerelease is_immutable release_url <<< "$fields"
          [[ "$actual_tag" == "$tag" ]]
          [[ "$actual_name" == "$title" ]]
          [[ "$is_draft" == "false" ]]
          [[ "$is_prerelease" == "false" ]]
          [[ "$is_immutable" == "true" ]]
          [[ "$release_url" == "https://github.com/fenutech/preflight-scout/releases/tag/${tag}" ]]
          [[ "$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)" == "$tag" ]]
          printf 'Verified matching latest GitHub release for %s: %s\n' "$tag" "$release_url"

      - name: Advance the stable plugin channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REPOSITORY" == "fenutech/preflight-scout" ]]
          [[ "$GITHUB_REF_TYPE" == "tag" ]]
          [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]

          git fetch --no-tags origin \
            +refs/heads/plugin-stable:refs/remotes/origin/plugin-stable
          stable_sha="$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/plugin-stable" \
            --jq .object.sha)"
          [[ "$stable_sha" =~ ^[0-9a-f]{40}$ ]]
          [[ "$(git rev-parse refs/remotes/origin/plugin-stable)" == "$stable_sha" ]]

          if [[ "$stable_sha" != "$GITHUB_SHA" ]]; then
            git merge-base --is-ancestor "$stable_sha" "$GITHUB_SHA"
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/heads/plugin-stable" \
              -f sha="$GITHUB_SHA" \
              -F force=false \
              --silent
          fi

          [[ "$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/plugin-stable" \
            --jq .object.sha)" == "$GITHUB_SHA" ]]
          printf 'Advanced plugin-stable to %s after npm and GitHub release verification.\n' "$GITHUB_SHA"
