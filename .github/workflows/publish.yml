name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact SemVer to publish, without a leading v.
        required: true
        type: string
      authentication:
        description: Use bootstrap-token only for the first publication, then configure all six trusted publishers and use trusted-publishing.
        required: true
        default: trusted-publishing
        type: choice
        options:
          - trusted-publishing
          - bootstrap-token
      confirmation:
        description: Type PUBLISH @preflight-scout VERSION <version> FROM v<version>
        required: true
        type: string

concurrency:
  group: npm-publication-${{ inputs.version }}
  cancel-in-progress: false

permissions: {}

jobs:
  validate:
    name: Validate immutable npm candidate
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      actions: read
      contents: read
    outputs:
      artifact-name: ${{ steps.candidate.outputs.artifact_name }}
      checksums-sha256: ${{ steps.candidate.outputs.checksums_sha256 }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          package-manager-cache: false

      - name: Reject the wrong repository, visibility, ref, or confirmation
        env:
          AUTHENTICATION: ${{ inputs.authentication }}
          CONFIRMATION: ${{ inputs.confirmation }}
          EXPECTED_REPOSITORY: fenutech/preflight-scout
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$REPOSITORY" == "$EXPECTED_REPOSITORY" ]]
          [[ "$REPOSITORY_PRIVATE" == "false" ]]
          [[ "$GITHUB_REF_TYPE" == "tag" ]]
          [[ "$GITHUB_REF" == "refs/tags/v${VERSION}" ]]
          [[ "$GITHUB_REF_NAME" == "v${VERSION}" ]]
          [[ "$CONFIRMATION" == "PUBLISH @preflight-scout VERSION ${VERSION} FROM v${VERSION}" ]]
          [[ "$AUTHENTICATION" == "bootstrap-token" || "$AUTHENTICATION" == "trusted-publishing" ]]

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.ref }}

      - name: Verify the tag commit is contained in main
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$GITHUB_SHA" ]]
          [[ "$(git rev-list -n 1 "$GITHUB_REF")" == "$GITHUB_SHA" ]]
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main

      - name: Verify live repository and protected npm environment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/verify-publication-gates.mjs

      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "24.15.0"

      - run: pnpm install --frozen-lockfile
      - run: pnpm prepare:packages
      - run: pnpm check:package-assets
      - run: pnpm check:release-version -- "${{ inputs.version }}"
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test:ci
      - run: pnpm playwright:install:ci
      - run: pnpm test:browser
      - run: pnpm audit --prod --audit-level high
      - run: pnpm check:repo
      - run: pnpm test:package-guard
      - run: pnpm test:source-cli-wrapper
      - run: pnpm test:external-tools
      - run: pnpm test:public-export
      - run: pnpm test:publication
      - run: pnpm pack:check
      - run: pnpm test:npm-global-smoke
      - run: pnpm smoke:npm-global
        env:
          PREFLIGHT_SCOUT_NPM_SMOKE_INSTALL_BROWSER: "1"
      - run: pnpm smoke:install
        env:
          PREFLIGHT_SCOUT_SMOKE_INSTALL_BROWSER: "1"
      - run: pnpm test:skill
      - run: pnpm package:skill
      - name: Verify npm would accept all package publications
        run: pnpm -r --filter './packages/*' publish --access public --dry-run --no-git-checks

      - name: Build immutable publication artifact
        id: candidate
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          node scripts/publication-artifact.mjs prepare \
            --source .preflight-scout/package-check \
            --output .preflight-scout/publication-candidate \
            --version "$VERSION" \
            --commit "$GITHUB_SHA"
          checksums_sha256="sha256:$(sha256sum .preflight-scout/publication-candidate/SHA256SUMS | cut -d ' ' -f 1)"
          artifact_name="preflight-scout-npm-${VERSION}-${GITHUB_SHA}"
          printf 'checksums_sha256=%s\n' "$checksums_sha256" >> "$GITHUB_OUTPUT"
          printf 'artifact_name=%s\n' "$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload exact publication candidate
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.candidate.outputs.artifact_name }}
          path: .preflight-scout/publication-candidate/
          include-hidden-files: false
          if-no-files-found: error
          compression-level: 0
          retention-days: 2

  publish:
    name: Publish verified npm tarballs
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm-production
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install the pinned OIDC-capable npm CLI without lifecycle scripts
        run: |
          npm install --global npm@11.18.0 --ignore-scripts
          [[ "$(npm --version)" == "11.18.0" ]]

      - name: Download only this run's validated candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.validate.outputs.artifact-name }}
          path: publication-candidate

      - name: Reverify artifact identity, checksums, version, and commit
        env:
          EXPECTED_CHECKSUMS_SHA256: ${{ needs.validate.outputs.checksums-sha256 }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "${{ needs.validate.outputs.artifact-digest }}" =~ ^[0-9a-f]{64}$ ]]
          actual="sha256:$(sha256sum publication-candidate/SHA256SUMS | cut -d ' ' -f 1)"
          [[ "$actual" == "$EXPECTED_CHECKSUMS_SHA256" ]]
          node publication-candidate/publication-artifact.mjs verify \
            --directory publication-candidate \
            --version "$VERSION" \
            --commit "$GITHUB_SHA"

      - name: Publish first versions with the protected bootstrap token
        if: inputs.authentication == 'bootstrap-token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          node publication-candidate/publication-artifact.mjs publish \
            --directory publication-candidate \
            --version "$VERSION" \
            --commit "$GITHUB_SHA" \
            --mode bootstrap-token

      - name: Publish with package-specific npm trusted publishers
        if: inputs.authentication == 'trusted-publishing'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node publication-candidate/publication-artifact.mjs publish \
            --directory publication-candidate \
            --version "$VERSION" \
            --commit "$GITHUB_SHA" \
            --mode trusted-publishing

  verify-live-install:
    name: Verify live npm install (${{ matrix.os }})
    needs: publish
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          package-manager-cache: false

      - name: Wait for the exact public registry version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          packages=(core agent-exec browser-runner mcp github-action cli)
          missing=()
          for _attempt in {1..60}; do
            missing=()
            for package in "${packages[@]}"; do
              if [[ "$(npm view "@preflight-scout/${package}@${VERSION}" version --registry=https://registry.npmjs.org/ 2>/dev/null || true)" != "$VERSION" ]]; then
                missing+=("@preflight-scout/${package}@${VERSION}")
              fi
            done
            if (( ${#missing[@]} == 0 )); then
              exit 0
            fi
            sleep 5
          done
          printf 'These packages did not become readable from the public registry: %s\n' "${missing[*]}" >&2
          exit 1

      - name: Install the exact public CLI with npm
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: npm install --global --prefix "$RUNNER_TEMP/preflight-scout-npm" "@preflight-scout/cli@${VERSION}" --registry=https://registry.npmjs.org/

      - name: Validate the installed command and browser on Linux
        if: runner.os == 'Linux'
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          command="$RUNNER_TEMP/preflight-scout-npm/bin/preflight-scout"
          [[ "$("$command" --version)" == "$VERSION" ]]
          "$command" install-browser

      - name: Validate the installed command and browser on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          $command = Join-Path $env:RUNNER_TEMP "preflight-scout-npm\preflight-scout.cmd"
          if ((& $command --version).Trim() -ne $env:VERSION) { throw "Unexpected Preflight Scout version" }
          & $command install-browser
