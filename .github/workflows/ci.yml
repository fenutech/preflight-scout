name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ["22.13.0", "24"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test:ci

  package:
    name: Package and repository health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - name: Verify release version coupling
        run: |
          RELEASE_VERSION="$(node -p "require('./package.json').version")"
          pnpm check:release-version -- "$RELEASE_VERSION"
      - run: pnpm build
      - run: pnpm check:site
      - run: pnpm audit --prod --audit-level high
      - run: pnpm check:repo
      - run: pnpm test:public-export
      - run: pnpm test:publication
      - run: pnpm pack:check
      - run: pnpm test:npm-global-smoke
      - run: pnpm smoke:npm-global
      - run: pnpm smoke:install
      - run: pnpm test:skill
      - run: pnpm package:skill

  browser:
    name: Browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm playwright:install:ci
      - run: pnpm build
      - run: pnpm test:browser

  windows-wrapper:
    name: Windows source CLI install and wrapper
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22.13.0"
      - run: pnpm install --frozen-lockfile
      - run: node scripts/test-source-cli-wrapper.mjs
      - name: Install durable source CLI
        shell: bash
        run: pnpm install:source-cli -- --bin-dir "$RUNNER_TEMP/preflight-scout-bin"
      - name: Execute installed Windows wrapper
        shell: pwsh
        run: '& "$env:RUNNER_TEMP\preflight-scout-bin\preflight-scout.cmd" --version'
      - name: Pack exact npm consumer artifacts
        shell: bash
        run: |
          node scripts/verify-packed-packages.mjs --prepare
          pnpm -r --filter './packages/*' pack --pack-destination .preflight-scout/package-check
          node scripts/verify-packed-packages.mjs
      - run: pnpm test:npm-global-smoke
      - run: pnpm smoke:npm-global

  required:
    name: Required
    if: always()
    needs: [test, package, browser, windows-wrapper]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Confirm required jobs passed
        env:
          TEST_RESULT: ${{ needs.test.result }}
          PACKAGE_RESULT: ${{ needs.package.result }}
          BROWSER_RESULT: ${{ needs.browser.result }}
          WINDOWS_WRAPPER_RESULT: ${{ needs.windows-wrapper.result }}
        run: |
          if [[ "$TEST_RESULT" != "success" || "$PACKAGE_RESULT" != "success" || "$BROWSER_RESULT" != "success" || "$WINDOWS_WRAPPER_RESULT" != "success" ]]; then
            echo "Required CI failed: test=$TEST_RESULT package=$PACKAGE_RESULT browser=$BROWSER_RESULT windows-wrapper=$WINDOWS_WRAPPER_RESULT"
            exit 1
          fi
