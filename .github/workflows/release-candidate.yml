name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact package version to validate, without a leading v.
        required: true
        default: "0.1.0"
        type: string

concurrency:
  group: release-candidate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  windows-wrapper:
    name: Validate Windows source CLI install and wrapper
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22.13.0"
      - run: pnpm install --frozen-lockfile
      - run: node scripts/test-source-cli-wrapper.mjs
      - name: Install durable source CLI
        shell: bash
        run: pnpm install:source-cli -- --bin-dir "$RUNNER_TEMP/preflight-scout-bin"
      - name: Execute installed Windows wrapper
        shell: pwsh
        run: '& "$env:RUNNER_TEMP\preflight-scout-bin\preflight-scout.cmd" --version'
      - name: Pack exact npm consumer artifacts
        shell: bash
        run: |
          node scripts/verify-packed-packages.mjs --prepare
          pnpm -r --filter './packages/*' pack --pack-destination .preflight-scout/package-check
          node scripts/verify-packed-packages.mjs
      - run: pnpm test:npm-global-smoke
      - run: pnpm smoke:npm-global

  candidate:
    name: Validate ${{ inputs.version }}
    needs: windows-wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22.13.0"
      - run: pnpm install --frozen-lockfile
      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: pnpm check:release-version -- "$RELEASE_VERSION"
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm check:site
      - run: pnpm test:ci
      - run: pnpm playwright:install:ci
      - run: pnpm test:browser
      - run: pnpm audit --prod --audit-level high
      - run: pnpm check:repo
      - run: pnpm test:repo-boundary
      - run: pnpm test:publication
      - run: pnpm pack:check
      - run: pnpm test:npm-global-smoke
      - run: pnpm smoke:npm-global
        env:
          PREFLIGHT_SCOUT_NPM_SMOKE_INSTALL_BROWSER: "1"
      - run: pnpm smoke:install
        env:
          PREFLIGHT_SCOUT_SMOKE_INSTALL_BROWSER: "1"
      - run: pnpm test:skill
      - run: pnpm package:skill
      - name: Validate npm package publication without publishing
        run: pnpm -r --filter './packages/*' publish --access public --dry-run --no-git-checks
      - name: Record checksums
        run: sha256sum .preflight-scout/package-check/*.tgz dist/preflight-scout-skill.zip > release-checksums.txt
      - name: Upload candidate artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preflight-scout-${{ inputs.version }}-candidate-${{ github.run_id }}
          path: |
            .preflight-scout/package-check/*.tgz
            dist/preflight-scout-skill.zip
            release-checksums.txt
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
