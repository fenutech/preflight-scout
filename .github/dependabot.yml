version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    # Match pnpm's minimumReleaseAge policy. Security updates are not delayed by
    # Dependabot cooldowns.
    cooldown:
      default-days: 1
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Rome
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - area:github-action
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
